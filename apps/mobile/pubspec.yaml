name: dehna
description: Desk worker wellness breaks, tailored to how you feel.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Local storage
  path_provider: ^2.1.5

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Audio (break chime)
  audioplayers: ^6.4.0

  # Utilities
  shared_preferences: ^2.3.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/data/
